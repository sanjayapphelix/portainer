image:
  repository: sanjayyyy/portainer
  tag: v1
  pullPolicy: IfNotPresent

replicaCount: 1
containerPort: 9000

service:
  type: NodePort
  port: 9000
  nodePort: 30090

serviceAccount:
  create: true
  name: ""

ingress:
  enabled: false
  annotations: {}
  hosts:
    - host: portainer.local
      paths:
        - /
  tls: []

