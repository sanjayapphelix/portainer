apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "portainer.fullname" . }}
  labels:
    app: {{ include "portainer.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "portainer.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "portainer.name" . }}
    spec:
      containers:
        - name: portainer
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--kubernetes"
          ports:
            - name: http
              containerPort: {{ .Values.containerPort | default 9000 }}
          volumeMounts:
            - name: portainer-data
              mountPath: /data
      volumes:
        - name: portainer-data
          emptyDir: {}

